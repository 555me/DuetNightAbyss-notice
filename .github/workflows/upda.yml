name: w6
on:
  schedule:
  - cron: 1,35 * * * *
  workflow_dispatch:

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    permissions: write-all  

    steps:
    - name: zp
      uses: actions/checkout@v4

    - name: Dm
      run: |
        echo "# 二重螺旋公告MD版" > README.md
        echo "公告更新时间：" >> README.md
        Kb="http://pan01-1-eo.shyxhy.com/OperationGameNotice/OperationGameNotice10001"
        mQ="http://pan01-1-eo.shyxhy.com/OperationGameNotice/OperationGameNotice80001"
        c3="http://pan01-1-eo.shyxhy.com/OperationGameNotice/OperationGameNotice70001"
        curl -sI $Kb | grep -i 'Last-Modified:' | cut -d' ' -f2- >> README.md
        curl $Kb > data/notice.json
        curl $mQ > data/notice_beta1.lua
        curl $c3 > data/notice_beta2.lua
        jq "." data/notice.json > ce.json && mv ce.json data/notice.json

    - name: 6k
      if: success()
      run: |
        git config --global user.name "222"
        git config --global user.email "cmude@github.com"
        if ! git diff --quiet README.md; then
          git add -A .
          git commit -m "v2"
          git push origin main
          echo "update successful!"
          exit 0
        else
          echo "No changes detected."
          exit 0
        fi